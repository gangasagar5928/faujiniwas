<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaujiNiwas Security Scanner — Vulnerability Audit</title>
  <meta name="description" content="Self-hosted vulnerability scanner for FaujiNiwas — checks security headers, CORS, cookies, XSS, exposed keys, open redirects, mixed content, and CSP." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="scanner.css" />
</head>
<body>

<div class="scanner-wrap">

  <!-- ── Header ───────────────────────────────────────── -->
  <header class="scanner-header">
    <div class="scanner-logo">
      <div class="logo-icon">🛡️</div>
      <span class="scanner-title">FaujiNiwas SecScan</span>
    </div>
    <p class="scanner-subtitle">Automated Vulnerability Audit · Defence-Grade</p>
    <div class="scanner-target-badge">
      TARGET → <span>https://faujiniwas.web.app</span>
    </div>
  </header>

  <!-- ── Trigger ──────────────────────────────────────── -->
  <div class="scan-btn-wrap">
    <button id="scan-btn" onclick="startScan()">▶ INITIATE SCAN</button>
  </div>

  <!-- ── Progress ─────────────────────────────────────── -->
  <div id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Initializing...</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <!-- ── Terminal Log ─────────────────────────────────── -->
  <div id="terminal-log"></div>

  <!-- ── Summary Bar ──────────────────────────────────── -->
  <div id="summary-bar">
    <div class="summary-stat">
      <span class="stat-num stat-pass" id="count-pass">0</span>
      <span class="stat-label">Passed</span>
    </div>
    <div class="summary-stat">
      <span class="stat-num stat-warn" id="count-warn">0</span>
      <span class="stat-label">Warnings</span>
    </div>
    <div class="summary-stat">
      <span class="stat-num stat-fail" id="count-fail">0</span>
      <span class="stat-label">Failed</span>
    </div>
  </div>

  <!-- ── Results Grid ─────────────────────────────────── -->
  <div id="results-grid"></div>

  <!-- ── Footer ───────────────────────────────────────── -->
  <footer class="scanner-footer">
    FaujiNiwas Security Scanner v1.0 · Built for <a href="https://faujiniwas.web.app">faujiniwas.web.app</a><br/>
    Scans only the live FaujiNiwas site · No data leaves your browser
  </footer>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   FaujiNiwas Security Scanner — All logic runs in-browser
   Target: https://faujiniwas.web.app (hardcoded, self-scan only)
   ═══════════════════════════════════════════════════════════ */

const TARGET = 'https://faujiniwas.web.app';

// ── DOM refs ────────────────────────────────────────────
const $btn       = document.getElementById('scan-btn');
const $progress  = document.getElementById('progress-wrap');
const $bar       = document.getElementById('progress-bar');
const $pctLabel  = document.getElementById('progress-pct');
const $progText  = document.getElementById('progress-text');
const $terminal  = document.getElementById('terminal-log');
const $summary   = document.getElementById('summary-bar');
const $grid      = document.getElementById('results-grid');
const $cntPass   = document.getElementById('count-pass');
const $cntWarn   = document.getElementById('count-warn');
const $cntFail   = document.getElementById('count-fail');

let results = [];

// ── Helpers ─────────────────────────────────────────────
function log(text, cls = '') {
  const span = document.createElement('span');
  span.className = 'log-line';
  span.innerHTML = `<span class="log-prefix">[${new Date().toLocaleTimeString()}]</span> <span class="${cls}">${text}</span>`;
  $terminal.appendChild(span);
  $terminal.scrollTop = $terminal.scrollHeight;
}

function setProgress(pct, label) {
  $bar.style.width = pct + '%';
  $pctLabel.textContent = pct + '%';
  if (label) $progText.textContent = label;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function pushResult(id, title, status, description, detail, fix) {
  results.push({ id, title, status, description, detail, fix });
}

// ── Checks ──────────────────────────────────────────────

async function checkSecurityHeaders(headers) {
  log('Analyzing security headers...', 'log-info');
  await delay(200);

  const checks = [
    { header: 'x-content-type-options', expect: 'nosniff',     name: 'X-Content-Type-Options' },
    { header: 'x-frame-options',        expect: null,           name: 'X-Frame-Options' },
    { header: 'strict-transport-security', expect: null,        name: 'Strict-Transport-Security (HSTS)' },
    { header: 'x-xss-protection',       expect: null,           name: 'X-XSS-Protection' },
    { header: 'referrer-policy',        expect: null,           name: 'Referrer-Policy' },
    { header: 'permissions-policy',     expect: null,           name: 'Permissions-Policy' },
  ];

  let pass = 0, warn = 0, fail = 0;
  let details = [];

  for (const c of checks) {
    const val = headers.get(c.header);
    if (val) {
      if (c.expect && !val.toLowerCase().includes(c.expect)) {
        details.push(`⚠ ${c.name}: ${val} (expected: ${c.expect})`);
        warn++;
      } else {
        details.push(`✓ ${c.name}: ${val}`);
        pass++;
      }
    } else {
      details.push(`✗ ${c.name}: Missing`);
      fail++;
    }
  }

  let status = fail > 2 ? 'fail' : fail > 0 ? 'warn' : 'pass';
  log(`Security headers: ${pass} present, ${fail} missing`, status === 'pass' ? 'log-ok' : status === 'warn' ? 'log-warn' : 'log-fail');

  pushResult('headers', 'Security Headers', status,
    `Checked ${checks.length} security headers. ${pass} present, ${warn} misconfigured, ${fail} missing.`,
    details.join('\n'),
    fail > 0 ? '<strong>Fix:</strong> Add missing headers in firebase.json under hosting.headers. Recommended: X-Frame-Options: DENY, HSTS with max-age=31536000, Referrer-Policy: strict-origin-when-cross-origin.' : null
  );
}

async function checkCSP(headers) {
  log('Checking Content-Security-Policy...', 'log-info');
  await delay(200);

  const csp = headers.get('content-security-policy');
  if (csp) {
    const hasUnsafe = csp.includes("'unsafe-inline'") || csp.includes("'unsafe-eval'");
    if (hasUnsafe) {
      log('CSP present but contains unsafe directives', 'log-warn');
      pushResult('csp', 'Content Security Policy', 'warn',
        'CSP header is set but includes unsafe-inline or unsafe-eval, which weakens XSS protection.',
        `CSP value: ${csp.substring(0, 300)}...`,
        '<strong>Fix:</strong> Replace unsafe-inline with nonce-based or hash-based script loading. Remove unsafe-eval unless strictly required.'
      );
    } else {
      log('CSP header present and properly configured', 'log-ok');
      pushResult('csp', 'Content Security Policy', 'pass',
        'Content-Security-Policy header is present and does not contain obviously unsafe directives.',
        `CSP value: ${csp.substring(0, 300)}${csp.length > 300 ? '...' : ''}`,
        null
      );
    }
  } else {
    log('CSP header is MISSING — XSS risk elevated', 'log-fail');
    pushResult('csp', 'Content Security Policy', 'fail',
      'No Content-Security-Policy header found. This leaves the app more vulnerable to XSS and code injection attacks.',
      'The server did not return a Content-Security-Policy header.',
      '<strong>Fix:</strong> Add a CSP header in firebase.json. Start with: default-src \'self\'; script-src \'self\'; style-src \'self\' \'unsafe-inline\' https://fonts.googleapis.com; img-src \'self\' data: https:; font-src https://fonts.gstatic.com;'
    );
  }
}

async function checkCORS(headers) {
  log('Testing CORS configuration...', 'log-info');
  await delay(300);

  const acao = headers.get('access-control-allow-origin');
  if (acao === '*') {
    log('CORS is wildcard (*) — overly permissive', 'log-warn');
    pushResult('cors', 'CORS Configuration', 'warn',
      'Access-Control-Allow-Origin is set to * (wildcard). This allows any origin to read responses, which may expose data to malicious sites.',
      `Access-Control-Allow-Origin: ${acao}`,
      '<strong>Fix:</strong> Restrict CORS to specific trusted origins instead of wildcard. For Firebase Hosting, this is typically safe since it serves static files, but APIs should be locked down.'
    );
  } else if (acao) {
    log(`CORS origin restricted to: ${acao}`, 'log-ok');
    pushResult('cors', 'CORS Configuration', 'pass',
      'CORS is configured with a restricted origin, limiting cross-origin access appropriately.',
      `Access-Control-Allow-Origin: ${acao}`,
      null
    );
  } else {
    log('No CORS header — default browser SOP applies', 'log-ok');
    pushResult('cors', 'CORS Configuration', 'pass',
      'No Access-Control-Allow-Origin header present. The browser\'s default Same-Origin Policy is enforced, which is the most restrictive and secure option.',
      'No CORS headers returned. Same-Origin Policy (SOP) is active by default.',
      null
    );
  }
}

async function checkExposedKeys(html) {
  log('Scanning page source for exposed API keys...', 'log-info');
  await delay(400);

  const patterns = [
    { regex: /AIza[0-9A-Za-z\-_]{35}/g,           name: 'Google API Key (AIza...)' },
    { regex: /AAAA[A-Za-z0-9_-]{7}:[A-Za-z0-9_-]{140}/g, name: 'Firebase Server Key' },
    { regex: /sk-[A-Za-z0-9]{20,}/g,              name: 'OpenAI / Stripe Secret Key (sk-...)' },
    { regex: /ghp_[A-Za-z0-9]{36}/g,              name: 'GitHub Personal Access Token' },
    { regex: /-----BEGIN (RSA |EC )?PRIVATE KEY-----/g, name: 'Private Key PEM' },
    { regex: /aws_secret_access_key\s*=\s*[A-Za-z0-9\/+=]{40}/gi, name: 'AWS Secret Key' },
  ];

  let found = [];
  for (const p of patterns) {
    const matches = html.match(p.regex);
    if (matches) {
      // Firebase client-side API keys (AIza...) are expected in SPAs — downgrade to info
      if (p.name.includes('Google API Key')) {
        found.push({ name: p.name, count: matches.length, severity: 'info',
          note: 'Firebase client API keys are designed to be public. They are restricted by Firebase Security Rules, not secrecy.' });
      } else {
        found.push({ name: p.name, count: matches.length, severity: 'critical' });
      }
    }
  }

  if (found.length === 0) {
    log('No exposed API keys detected', 'log-ok');
    pushResult('keys', 'Exposed API Keys', 'pass',
      'No secret API keys, tokens, or private keys were found in the page source.',
      'Scanned for: Google API keys, Firebase server keys, OpenAI/Stripe secrets, GitHub tokens, AWS keys, PEM private keys.',
      null
    );
  } else {
    const criticals = found.filter(f => f.severity === 'critical');
    const infos = found.filter(f => f.severity === 'info');
    const status = criticals.length > 0 ? 'fail' : 'warn';

    log(`Found ${found.length} key pattern(s): ${criticals.length} critical, ${infos.length} expected`, status === 'fail' ? 'log-fail' : 'log-warn');

    let detail = found.map(f => {
      const badge = f.severity === 'critical' ? '🔴 CRITICAL' : '🔵 EXPECTED';
      return `${badge} ${f.name} — ${f.count} occurrence(s)${f.note ? '\n   └ ' + f.note : ''}`;
    }).join('\n');

    pushResult('keys', 'Exposed API Keys', status,
      criticals.length > 0
        ? `Found ${criticals.length} potentially dangerous key(s) exposed in page source!`
        : `Found ${infos.length} expected client-side key(s). No secret keys exposed.`,
      detail,
      criticals.length > 0 ? '<strong>Fix:</strong> Move secret keys to server-side environment variables. Never ship private keys, server tokens, or AWS secrets in client-side JavaScript.' : null
    );
  }
}

async function checkCookies() {
  log('Inspecting cookie security attributes...', 'log-info');
  await delay(200);

  // We can only inspect cookies accessible to JS (non-HttpOnly ones)
  const cookies = document.cookie;

  // Since we're on a different origin, document.cookie will be empty
  // We simulate by checking if target sets cookies via the fetch response
  // For same-origin scanner hosted on faujiniwas.web.app, this check works

  if (!cookies || cookies.trim() === '') {
    log('No JavaScript-accessible cookies found', 'log-ok');
    pushResult('cookies', 'Cookie Security', 'pass',
      'No cookies are accessible via document.cookie. Either no cookies are set, or all cookies have the HttpOnly flag (best practice).',
      'document.cookie returned empty. This means cookies are either not used or properly protected with HttpOnly.',
      null
    );
  } else {
    const cookieList = cookies.split(';').map(c => c.trim());
    let insecure = [];

    for (const c of cookieList) {
      const name = c.split('=')[0];
      // JS-accessible cookies are inherently missing HttpOnly
      insecure.push(`⚠ "${name}" is accessible to JavaScript (missing HttpOnly flag)`);
    }

    log(`${insecure.length} cookie(s) accessible to JS — potential XSS target`, 'log-warn');
    pushResult('cookies', 'Cookie Security', 'warn',
      `${insecure.length} cookie(s) are readable by JavaScript. If an XSS vulnerability exists, these cookies could be stolen.`,
      insecure.join('\n'),
      '<strong>Fix:</strong> Set HttpOnly, Secure, and SameSite=Strict flags on all sensitive cookies. Avoid storing session tokens in JavaScript-accessible cookies.'
    );
  }
}

async function checkXSSHints(html) {
  log('Scanning for potential XSS risk patterns...', 'log-info');
  await delay(350);

  const patterns = [
    { regex: /\.innerHTML\s*=/g,       name: 'innerHTML assignment', risk: 'Direct DOM insertion — user input could be rendered as HTML' },
    { regex: /eval\s*\(/g,            name: 'eval() usage',          risk: 'Arbitrary code execution from dynamic strings' },
    { regex: /document\.write\s*\(/g, name: 'document.write()',      risk: 'Writes directly to DOM — can inject scripts' },
    { regex: /\$\(\s*['"`].*['"`]\s*\)\.html\s*\(/g, name: 'jQuery .html()', risk: 'jQuery DOM injection — same risk as innerHTML' },
    { regex: /dangerouslySetInnerHTML/g, name: 'React dangerouslySetInnerHTML', risk: 'Bypasses React XSS protection — ensure input is sanitized' },
    { regex: /v-html\s*=/g,           name: 'Vue v-html directive',  risk: 'Renders raw HTML — bypasses Vue XSS protection' },
  ];

  let found = [];
  for (const p of patterns) {
    const matches = html.match(p.regex);
    if (matches) {
      found.push({ ...p, count: matches.length });
    }
  }

  if (found.length === 0) {
    log('No obvious XSS risk patterns detected', 'log-ok');
    pushResult('xss', 'XSS Risk Patterns', 'pass',
      'No innerHTML, eval(), document.write(), or framework-specific raw HTML injection patterns found in the page source.',
      'Scanned for: innerHTML=, eval(), document.write(), jQuery .html(), React dangerouslySetInnerHTML, Vue v-html.',
      null
    );
  } else {
    log(`Found ${found.length} XSS-risk pattern type(s) in source`, 'log-warn');
    pushResult('xss', 'XSS Risk Patterns', 'warn',
      `Detected ${found.length} pattern(s) that could enable XSS if user input reaches them without sanitization.`,
      found.map(f => `⚠ ${f.name} — ${f.count} occurrence(s)\n   └ Risk: ${f.risk}`).join('\n'),
      '<strong>Fix:</strong> Replace innerHTML with textContent where possible. Never pass user input to eval(). Use DOMPurify or framework-native sanitization for any dynamic HTML rendering.'
    );
  }
}

async function checkOpenRedirects(html) {
  log('Checking for open redirect patterns...', 'log-info');
  await delay(250);

  const paramPatterns = /[?&](redirect|url|next|return|returnTo|goto|continue|dest|destination|redir|forward)\s*=/gi;
  const matches = html.match(paramPatterns);

  if (!matches || matches.length === 0) {
    log('No open redirect parameters detected', 'log-ok');
    pushResult('redirects', 'Open Redirects', 'pass',
      'No URL parameters commonly associated with open redirects (redirect=, url=, next=, returnTo=, goto=) were found in the page source.',
      'Scanned links and source for: ?redirect=, ?url=, ?next=, ?return=, ?goto=, ?dest=, ?forward=, ?continue=',
      null
    );
  } else {
    log(`Found ${matches.length} redirect-like parameter(s)`, 'log-warn');
    pushResult('redirects', 'Open Redirects', 'warn',
      `Found ${matches.length} URL parameter(s) that could be used for open redirects if not validated server-side.`,
      `Detected parameters:\n${[...new Set(matches)].map(m => `  • ${m}`).join('\n')}`,
      '<strong>Fix:</strong> Validate all redirect URLs against a whitelist of allowed domains. Never redirect to user-supplied URLs without validation. Use relative paths instead of absolute URLs where possible.'
    );
  }
}

async function checkMixedContent(html) {
  log('Scanning for mixed content (HTTP on HTTPS)...', 'log-info');
  await delay(250);

  // Check for http:// resource loads (not https://)
  const httpResources = /(?:src|href|action)\s*=\s*["']http:\/\/[^"']+["']/gi;
  const matches = html.match(httpResources);

  // Filter out harmless ones (like http://www.w3.org schema URIs)
  const filtered = matches ? matches.filter(m =>
    !m.includes('w3.org') &&
    !m.includes('xmlns') &&
    !m.includes('//schemas.')
  ) : [];

  if (filtered.length === 0) {
    log('No mixed content detected — all resources over HTTPS', 'log-ok');
    pushResult('mixed', 'Mixed Content', 'pass',
      'All resource references (scripts, styles, images, iframes) use HTTPS. No insecure HTTP loads detected.',
      'No src=, href=, or action= attributes pointing to http:// origins found.',
      null
    );
  } else {
    log(`Found ${filtered.length} HTTP resource(s) on HTTPS page!`, 'log-fail');
    pushResult('mixed', 'Mixed Content', 'fail',
      `${filtered.length} resource(s) are loaded over insecure HTTP on an HTTPS page. Browsers may block these, and they can be intercepted by attackers.`,
      filtered.slice(0, 10).map(m => `  ✗ ${m.trim()}`).join('\n') + (filtered.length > 10 ? `\n  ... and ${filtered.length - 10} more` : ''),
      '<strong>Fix:</strong> Replace all http:// URLs with https:// equivalents. Use protocol-relative URLs (//example.com) as a fallback, though explicit https:// is preferred.'
    );
  }
}

// ── Render Results ──────────────────────────────────────

function renderResults() {
  let pass = 0, warn = 0, fail = 0;
  $grid.innerHTML = '';

  for (const r of results) {
    if (r.status === 'pass') pass++;
    else if (r.status === 'warn') warn++;
    else fail++;

    const statusLabel = r.status === 'pass' ? 'SECURE' : r.status === 'warn' ? 'WARNING' : 'VULNERABLE';
    const icon = r.status === 'pass' ? '🟢' : r.status === 'warn' ? '🟡' : '🔴';

    const card = document.createElement('div');
    card.className = `check-card ${r.status}`;
    card.style.animationDelay = `${results.indexOf(r) * 0.08}s`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-icon">${icon}</div>
        <div class="card-body">
          <div class="card-title">${r.title}</div>
          <span class="card-status-badge">${statusLabel}</span>
          <p class="card-desc">${r.description}</p>
          ${r.detail ? `<div class="card-detail"><pre style="white-space:pre-wrap;margin:0;font-family:inherit;">${escapeHTML(r.detail)}</pre></div>` : ''}
          ${r.fix ? `<div class="card-fix">${r.fix}</div>` : ''}
        </div>
      </div>
    `;
    $grid.appendChild(card);
  }

  $cntPass.textContent = pass;
  $cntWarn.textContent = warn;
  $cntFail.textContent = fail;

  $summary.style.display = 'flex';
  $grid.style.display = 'grid';
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Main Scan Orchestrator ──────────────────────────────

async function startScan() {
  // Reset
  results = [];
  $grid.innerHTML = '';
  $terminal.innerHTML = '';
  $summary.style.display = 'none';
  $grid.style.display = 'none';
  $progress.style.display = 'block';
  $terminal.style.display = 'block';
  $btn.disabled = true;
  $btn.innerHTML = '<span class="scanning-dots">SCANNING</span>';

  const totalChecks = 8;
  let completed = 0;

  function advance(label) {
    completed++;
    setProgress(Math.round((completed / totalChecks) * 100), label);
  }

  try {
    log(`▶ Scan target: ${TARGET}`, 'log-info');
    log('Establishing connection...', 'log-info');
    setProgress(5, 'Fetching target...');

    // Fetch the target page
    let response, html;
    try {
      response = await fetch(TARGET, { mode: 'cors', redirect: 'follow' });
      html = await response.text();
      log(`Connection established — HTTP ${response.status} ${response.statusText}`, 'log-ok');
    } catch (e) {
      log(`Failed to fetch target: ${e.message}`, 'log-fail');
      log('Note: CORS restrictions may block scanning from a different origin.', 'log-warn');
      log('For best results, host this scanner on the same origin as the target.', 'log-info');

      // Provide partial results based on what we can check
      pushResult('fetch', 'Connection', 'fail',
        `Could not fetch ${TARGET}. CORS policy or network error prevented the scan.`,
        `Error: ${e.message}\n\nTo fix: Deploy security-scanner.html to faujiniwas.web.app so the scanner runs on the same origin.`,
        '<strong>Fix:</strong> Host this scanner at https://faujiniwas.web.app/security-scanner.html so it can access the target without CORS issues.'
      );
      renderResults();
      resetButton();
      return;
    }

    const headers = response.headers;

    // Run all 8 checks in sequence (for terminal log readability)
    await checkSecurityHeaders(headers);
    advance('Security headers analyzed');

    await checkCSP(headers);
    advance('CSP policy checked');

    await checkCORS(headers);
    advance('CORS configuration tested');

    await checkExposedKeys(html);
    advance('API key scan complete');

    await checkCookies();
    advance('Cookie security verified');

    await checkXSSHints(html);
    advance('XSS patterns scanned');

    await checkOpenRedirects(html);
    advance('Open redirects checked');

    await checkMixedContent(html);
    advance('Mixed content audit done');

    // Complete
    log('', '');
    log(`═══ SCAN COMPLETE ═══  ${results.filter(r=>r.status==='pass').length} passed · ${results.filter(r=>r.status==='warn').length} warnings · ${results.filter(r=>r.status==='fail').length} failed`, 'log-ok');

    await delay(300);
    renderResults();

  } catch (err) {
    log(`Unexpected error: ${err.message}`, 'log-fail');
    console.error(err);
  }

  resetButton();
}

function resetButton() {
  $btn.disabled = false;
  $btn.innerHTML = '↻ RE-SCAN';
}

</script>
</body>
</html>
