  <body>
    <div id="root">
      <style>
        #tactical-loader {
          position: fixed; inset: 0; background: #0b1325;
          display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .tactical-pulse {
          width: 70px; height: 70px; border-radius: 50%;
          border: 3px solid rgba(255,153,51,0.2);
          border-top-color: #FF9933;
          animation: spin 1s infinite linear, pulse 2s infinite ease-in-out;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 50% { box-shadow: 0 0 30px rgba(255,153,51,0.4); } }
      </style>
      <div id="tactical-loader"><div class="tactical-pulse"></div></div>
      <script>
        // Safety fallback: ensure loader is hidden after 6s even if bundle fails
        setTimeout(() => {
          const l = document.getElementById('tactical-loader');
          if (l) {
            l.style.transition = 'opacity 0.8s ease';
            l.style.opacity = '0';
            setTimeout(() => l.style.display = 'none', 800);
          }
        }, 6000);
      </script>
    </div>
    <script type="module" src="/src/landing.jsx"></script>
