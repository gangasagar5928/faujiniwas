    <script>
    (function () {
      /* ── Particle canvas ── */
      var canvas = document.getElementById('loader-canvas');
      var ctx = canvas && canvas.getContext('2d');
      var particles = [];
      var animFrame;

      function resizeCanvas() {
        if (!canvas) return;
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // Spawn particles
      for (var i = 0; i < 60; i++) {
        particles.push({
          x:  Math.random() * window.innerWidth,
          y:  Math.random() * window.innerHeight,
          vx: (Math.random() - 0.5) * 0.35,
          vy: (Math.random() - 0.5) * 0.35,
          r:  Math.random() * 1.4 + 0.4,
          a:  Math.random() * 0.55 + 0.1,
          c:  Math.random() > 0.55 ? '#f59e0b' : '#a3e635',
        });
      }

      function drawParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = canvas.width;
          if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height;
          if (p.y > canvas.height) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.c;
          ctx.globalAlpha = p.a;
          ctx.fill();
        }
        // Draw faint connecting lines between close particles
        ctx.globalAlpha = 0.06;
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = 0.6;
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        ctx.globalAlpha = 1;
        animFrame = requestAnimationFrame(drawParticles);
      }
      drawParticles();

      /* ── Loading stages ── */
      var statusEl   = document.getElementById('loader-status');
      var progressEl = document.getElementById('loader-progress');
      var steps = [
        document.getElementById('lstep-1'),
        document.getElementById('lstep-2'),
        document.getElementById('lstep-3'),
        document.getElementById('lstep-4'),
      ];

      var stages = [
        { msg: 'Initializing secure session…',    pct: 15 },
        { msg: 'Loading cantonment map data…',     pct: 45 },
        { msg: 'Preparing housing intelligence…',  pct: 75 },
        { msg: 'Almost ready…',                    pct: 95 },
      ];
      var stageIdx = 0;

      function applyStage(idx) {
        if (!stages[idx]) return;
        if (statusEl) statusEl.textContent = stages[idx].msg;
        if (progressEl) progressEl.style.width = stages[idx].pct + '%';
        steps.forEach(function(el, i) {
          if (!el) return;
          el.className = 'h-1 rounded-full transition-all duration-500 ' + (i < idx ? 'w-5 bg-[#a3e635]/50' : i === idx ? 'w-9 bg-[#f59e0b] shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'w-5 bg-white/10');
        });
      }
      applyStage(0);

      var tick = setInterval(function () {
        stageIdx = Math.min(stageIdx + 1, stages.length - 1);
        applyStage(stageIdx);
        if (stageIdx >= stages.length - 1) clearInterval(tick);
      }, 1700);

      /* ── Hide on app-ready ── */
      function hideLoader() {
        var l = document.getElementById('tactical-loader');
        if (l) l.classList.add('opacity-0');
        setTimeout(function() {
          if (l) l.style.display = 'none';
        }, 700);
        clearInterval(tick);
        cancelAnimationFrame(animFrame);
      }
      window.addEventListener('app-ready', hideLoader);

      /* ── Retry on timeout ── */
      setTimeout(function () {
        var l = document.getElementById('tactical-loader');
        var card = document.getElementById('loader-card');
        if (l && !l.classList.contains('opacity-0') && card) {
          clearInterval(tick);
          cancelAnimationFrame(animFrame);
          card.innerHTML =
            '<div class="flex flex-col items-center gap-4 text-[#f0f6ff]">' +
            '<div class="text-[2.2rem]">📡</div>' +
            '<div class="text-[0.85rem] text-gray-400/90 leading-relaxed">Slow connection detected.<br/>Map data is still loading…</div>' +
            '<button class="bg-gradient-to-r from-amber-400 to-amber-500 hover:scale-105 active:scale-95 text-[#030712] font-bold text-xs px-7 py-2.5 rounded-full shadow-[0_4px_20px_rgba(245,158,11,0.4)] transition-all" onclick="location.reload()">Retry Connection</button>' +
            '</div>';
        }
      }, 14000);
    })();
    </script>

    <script>
    (function() {
      // Apply saved values immediately to prevent FOUC
      var savedSize = localStorage.getItem('fn_fontsize') || '16px';
      document.documentElement.style.fontSize = savedSize;

      var savedTheme = localStorage.getItem('fn_theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        document.body.classList.add('light-theme');
      } else {
        document.documentElement.classList.remove('light-theme');
        document.body.classList.remove('light-theme');
      }

      // Setup Accessibility Widget event handlers
      window.addEventListener('DOMContentLoaded', function() {
        var widget = document.getElementById('accessibility-widget');
        var trigger = document.getElementById('acc-trigger');
        var menu = document.getElementById('acc-menu');
        var closeBtn = document.getElementById('acc-close');

        if (!trigger || !menu) return;

        trigger.addEventListener('click', function() {
          menu.classList.toggle('hidden');
          menu.classList.toggle('flex');
        });

        closeBtn.addEventListener('click', function() {
          menu.classList.add('hidden');
          menu.classList.remove('flex');
        });

        // Theme toggles
        var themeDark = document.getElementById('theme-dark');
        var themeLight = document.getElementById('theme-light');
        
        function updateThemeButtons(theme) {
          if (theme === 'dark') {
            themeDark.className = 'flex-1 py-1.5 text-xs font-black bg-amber-500 text-black rounded-lg transition-all cursor-pointer';
            themeLight.className = 'flex-1 py-1.5 text-xs font-bold bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition-all cursor-pointer';
          } else {
            themeLight.className = 'flex-1 py-1.5 text-xs font-black bg-amber-500 text-black rounded-lg transition-all cursor-pointer';
            themeDark.className = 'flex-1 py-1.5 text-xs font-bold bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition-all cursor-pointer';
          }
        }

        themeDark.addEventListener('click', function() {
          document.documentElement.classList.remove('light-theme');
          document.body.classList.remove('light-theme');
          localStorage.setItem('fn_theme', 'dark');
          updateThemeButtons('dark');
        });

        themeLight.addEventListener('click', function() {
          document.documentElement.classList.add('light-theme');
          document.body.classList.add('light-theme');
          localStorage.setItem('fn_theme', 'light');
          updateThemeButtons('light');
        });

        updateThemeButtons(savedTheme);

        // Font Size Toggles
        var sizes = {
          '14px': document.getElementById('fs-small'),
          '16px': document.getElementById('fs-normal'),
          '18px': document.getElementById('fs-large'),
          '20px': document.getElementById('fs-elderly')
        };

        function updateSizeButtons(currentSize) {
          Object.keys(sizes).forEach(function(size) {
            var btn = sizes[size];
            if (!btn) return;
            if (size === currentSize) {
              btn.className = 'flex-1 py-1.5 text-xs font-black bg-amber-500 text-black rounded-lg transition-all cursor-pointer';
            } else {
              btn.className = 'flex-1 py-1.5 text-xs font-bold bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition-all cursor-pointer';
            }
          });
        }

        Object.keys(sizes).forEach(function(size) {
          var btn = sizes[size];
          if (!btn) return;
          btn.addEventListener('click', function() {
            document.documentElement.style.fontSize = size;
            localStorage.setItem('fn_fontsize', size);
            updateSizeButtons(size);
          });
        });

        updateSizeButtons(savedSize);

        // Language Toggles
        var savedLang = localStorage.getItem('fn_lang') || 'en';
        var langs = {
          'en': document.getElementById('lang-en'),
          'hi': document.getElementById('lang-hi'),
          'pa': document.getElementById('lang-pa')
        };

        function updateLangButtons(currentLang) {
          Object.keys(langs).forEach(function(lang) {
            var btn = langs[lang];
            if (!btn) return;
            if (lang === currentLang) {
              btn.className = 'flex-1 py-1.5 text-xs font-black bg-amber-500 text-black rounded-lg transition-all cursor-pointer';
            } else {
              btn.className = 'flex-1 py-1.5 text-xs font-bold bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition-all cursor-pointer';
            }
          });
        }

        Object.keys(langs).forEach(function(lang) {
          var btn = langs[lang];
          if (!btn) return;
          btn.addEventListener('click', function() {
            localStorage.setItem('fn_lang', lang);
            updateLangButtons(lang);
            location.reload();
          });
        });

        updateLangButtons(savedLang);
      });
    })();
    </script>
  </body>
</html>
